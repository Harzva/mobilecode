name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag to upload the APK to
        required: false
        default: v0.1.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Recreate Android platform project
        working-directory: mobile_agent
        run: |
          rm -rf android
          flutter create --platforms=android --project-name mobile_agent --org com.mobilecode .
          sed -i 's/android:label="mobile_agent"/android:label="MobileCode"/' android/app/src/main/AndroidManifest.xml
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          text = text.replace(
              '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
              '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n'
              '    <uses-permission android:name="android.permission.INTERNET" />\n'
              '    <queries>\n'
              '        <package android:name="com.termux" />\n'
              '        <package android:name="com.termux.api" />\n'
              '        <intent>\n'
              '            <action android:name="android.intent.action.MAIN" />\n'
              '        </intent>\n'
              '    </queries>',
              1,
          )
          text = text.replace(
              '<application',
              '<application\n        android:hardwareAccelerated="true"\n        android:usesCleartextTraffic="true"',
              1,
          )
          manifest.write_text(text)

          gradle = Path("android/app/build.gradle.kts")
          if gradle.exists():
              gradle_text = gradle.read_text()
              gradle_text = gradle_text.replace("minSdk = flutter.minSdkVersion", "minSdk = 24")
              gradle.write_text(gradle_text)

          activity = Path("android/app/src/main/kotlin/com/mobilecode/mobile_agent/MainActivity.kt")
          activity.parent.mkdir(parents=True, exist_ok=True)
          activity.write_text(Path("tooling/MainActivity.kt").read_text())
          PY

      - name: Resolve Flutter dependencies
        working-directory: mobile_agent
        run: flutter pub get

      - name: Analyze Flutter sources
        working-directory: mobile_agent
        run: flutter analyze lib/main.dart lib/screens/home_screen.dart --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        working-directory: mobile_agent
        env:
          MOBILECODE_MANAGED_API_KEY: ${{ secrets.MOBILECODE_MANAGED_API_KEY }}
        run: |
          if [ -n "$MOBILECODE_MANAGED_API_KEY" ]; then
            flutter build apk --release --target lib/main.dart \
              --dart-define=MOBILECODE_MANAGED_PROVIDER=true \
              --dart-define=MOBILECODE_MANAGED_BASE_URL=https://token-plan-cn.xiaomimimo.com/anthropic \
              --dart-define=MOBILECODE_MANAGED_MODEL=mimo-v2.5-pro \
              --dart-define=MOBILECODE_MANAGED_API_KEY="$MOBILECODE_MANAGED_API_KEY"
          else
            flutter build apk --release --target lib/main.dart
          fi

      - name: Stage APK
        run: |
          mkdir -p artifacts
          cp mobile_agent/build/app/outputs/flutter-apk/app-release.apk artifacts/mobilecode-v0.1.0.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobilecode-apk
          path: artifacts/mobilecode-v0.1.0.apk

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" artifacts/mobilecode-v0.1.0.apk --clobber --repo "$GITHUB_REPOSITORY"
