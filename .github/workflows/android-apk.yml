name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag to upload the APK to
        required: false
        default: v0.1.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Recreate Android platform project
        working-directory: mobile_agent
        run: |
          rm -rf android
          flutter create --platforms=android --project-name mobile_agent --org com.mobilecode .
          python3 tooling/prepare_android_project.py

      - name: Resolve Flutter dependencies
        working-directory: mobile_agent
        run: flutter pub get

      - name: Analyze Flutter sources
        working-directory: mobile_agent
        run: flutter analyze lib/main.dart lib/screens/home_screen.dart --no-fatal-infos --no-fatal-warnings

      - name: Configure stable Android release signing
        working-directory: mobile_agent
        env:
          MOBILECODE_RELEASE_KEYSTORE_BASE64: ${{ secrets.MOBILECODE_RELEASE_KEYSTORE_BASE64 }}
          MOBILECODE_RELEASE_STORE_PASSWORD: ${{ secrets.MOBILECODE_RELEASE_STORE_PASSWORD }}
          MOBILECODE_RELEASE_KEY_ALIAS: ${{ secrets.MOBILECODE_RELEASE_KEY_ALIAS }}
          MOBILECODE_RELEASE_KEY_PASSWORD: ${{ secrets.MOBILECODE_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$MOBILECODE_RELEASE_KEYSTORE_BASE64" ] && [ -n "$MOBILECODE_RELEASE_STORE_PASSWORD" ] && [ -n "$MOBILECODE_RELEASE_KEY_ALIAS" ] && [ -n "$MOBILECODE_RELEASE_KEY_PASSWORD" ]; then
            mkdir -p android/app
            KEYSTORE_PATH="$PWD/android/app/mobilecode-release.jks"
            printf '%s' "$MOBILECODE_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            {
              echo "storeFile=$KEYSTORE_PATH"
              echo "storePassword=$MOBILECODE_RELEASE_STORE_PASSWORD"
              echo "keyAlias=$MOBILECODE_RELEASE_KEY_ALIAS"
              echo "keyPassword=$MOBILECODE_RELEASE_KEY_PASSWORD"
            } > android/key.properties
            echo "Stable release signing configured."
          else
            echo "Release signing secrets are not fully configured; falling back to Flutter debug signing."
          fi

      - name: Build release APK
        working-directory: mobile_agent
        env:
          MOBILECODE_MANAGED_API_KEY: ${{ secrets.MOBILECODE_MANAGED_API_KEY }}
        run: |
          if [ -n "$MOBILECODE_MANAGED_API_KEY" ]; then
            flutter build apk --release --target lib/main.dart \
              --dart-define=MOBILECODE_MANAGED_PROVIDER=true \
              --dart-define=MOBILECODE_MANAGED_BASE_URL=https://token-plan-cn.xiaomimimo.com/anthropic \
              --dart-define=MOBILECODE_MANAGED_MODEL=mimo-v2.5-pro \
              --dart-define=MOBILECODE_MANAGED_API_KEY="$MOBILECODE_MANAGED_API_KEY"
          else
            flutter build apk --release --target lib/main.dart
          fi

      - name: Stage APK
        run: |
          mkdir -p artifacts
          cp mobile_agent/build/app/outputs/flutter-apk/app-release.apk artifacts/mobilecode-v0.1.0.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobilecode-apk
          path: artifacts/mobilecode-v0.1.0.apk

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" artifacts/mobilecode-v0.1.0.apk --clobber --repo "$GITHUB_REPOSITORY"
