name: Developer Log

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  devlog-and-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build promotional site
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Attach docs and developer logs
        run: |
          mkdir -p app/dist/demo app/dist/github-test app/dist/assets app/dist/devlog
          cp -R docs/demo/2048 app/dist/demo/
          cp -R docs/github-test/* app/dist/github-test/
          cp -R docs/devlog/* app/dist/devlog/
          cp docs/mobilecode-update.json app/dist/mobilecode-update.json
          cp docs/mobilecode-local-models.json app/dist/mobilecode-local-models.json
          cp docs/mobilecode-principle-video.html app/dist/
          cp docs/mobilecode-principle-video-script.md app/dist/
          cp docs/assets/mobilecode-principle-* app/dist/assets/
          cp docs/assets/mobilecode-short-* app/dist/assets/

      - name: Verify committed developer log screenshot
        run: |
          test -f docs/devlog/index.json
          test -f docs/devlog/screenshots/latest.png
          grep -q '"latestScreenshot"' docs/devlog/index.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
