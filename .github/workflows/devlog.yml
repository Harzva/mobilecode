name: Developer Log

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Which developer log to generate
        required: false
        default: both
        type: choice
        options:
          - daily
          - important
          - both
      force_important:
        description: Write an important-change log even if the heuristic is quiet
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '25 8 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'app/**'
      - 'docs/**'
      - 'mobile_agent/**'
      - 'relay/**'
      - 'scripts/**'
    paths-ignore:
      - 'docs/devlog/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  devlog-and-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve log mode
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_FORCE_IMPORTANT: ${{ github.event.inputs.force_important }}
        run: |
          mode="$INPUT_MODE"
          force="$INPUT_FORCE_IMPORTANT"
          if [ "$EVENT_NAME" = "schedule" ]; then
            mode="daily"
            force="false"
          elif [ "$EVENT_NAME" = "push" ]; then
            mode="important"
            force="false"
          elif [ -z "$mode" ]; then
            mode="both"
          fi
          if [ -z "$force" ]; then
            force="false"
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "force=$force" >> "$GITHUB_OUTPUT"

      - name: Generate developer log
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MODE: ${{ steps.mode.outputs.mode }}
          FORCE_IMPORTANT: ${{ steps.mode.outputs.force }}
        run: |
          args=(--mode "$MODE")
          if [ "$FORCE_IMPORTANT" = "true" ]; then
            args+=(--force-important)
          fi
          python3 scripts/generate_devlog.py "${args[@]}"

      - name: Commit developer log updates
        run: |
          if git diff --quiet -- docs/devlog; then
            echo "No developer log changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/devlog
          git commit -m "Update developer logs [skip ci]"
          git push origin HEAD:main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build promotional site
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Attach docs and developer logs
        run: |
          mkdir -p app/dist/demo app/dist/github-test app/dist/assets app/dist/devlog
          cp -R docs/demo/2048 app/dist/demo/
          cp -R docs/github-test/* app/dist/github-test/
          cp -R docs/devlog/* app/dist/devlog/
          cp docs/mobilecode-update.json app/dist/mobilecode-update.json
          cp docs/mobilecode-local-models.json app/dist/mobilecode-local-models.json
          cp docs/mobilecode-principle-video.html app/dist/
          cp docs/mobilecode-principle-video-script.md app/dist/
          cp docs/assets/mobilecode-principle-* app/dist/assets/
          cp docs/assets/mobilecode-short-* app/dist/assets/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
