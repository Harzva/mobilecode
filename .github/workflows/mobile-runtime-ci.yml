name: Mobile Runtime CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'mobile_agent/**'
      - 'docs/mobilecode-helper-runtime-protocol.md'
      - 'docs/mobilecode-release-qa.md'
      - '.github/workflows/mobile-runtime-ci.yml'
  push:
    paths:
      - 'mobile_agent/**'
      - 'docs/mobilecode-helper-runtime-protocol.md'
      - 'docs/mobilecode-release-qa.md'
      - '.github/workflows/mobile-runtime-ci.yml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: mobile-runtime-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-runtime-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve Flutter dependencies
        working-directory: mobile_agent
        run: flutter pub get

      - name: Analyze runtime and app sources
        working-directory: mobile_agent
        run: |
          flutter analyze \
            lib/main.dart \
            lib/screens/home_screen.dart \
            lib/screens/build_preview_screen.dart \
            lib/services/runtime_provider.dart \
            lib/services/runtime_manager.dart \
            lib/services/runtime_actions.dart \
            lib/services/runtime_placeholder_providers.dart \
            lib/services/mobile_code_helper_provider.dart \
            lib/services/external_termux_provider.dart \
            lib/services/build_orchestrator.dart \
            lib/widgets/flutter_web_preview.dart \
            test/services/runtime_manager_test.dart \
            test/services/mobile_code_helper_provider_test.dart \
            --no-fatal-infos \
            --no-fatal-warnings

      - name: Run RuntimeProvider tests
        working-directory: mobile_agent
        run: |
          flutter test \
            test/services/runtime_manager_test.dart \
            test/services/mobile_code_helper_provider_test.dart

  helper-daemon-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile helper daemon
        run: |
          python3 -m py_compile mobile_agent/tooling/mobilecode_helper_daemon.py
          python3 -m py_compile mobile_agent/tooling/prepare_android_project.py

      - name: Smoke test helper protocol
        run: |
          set -eux
          mkdir -p artifacts /tmp/mobilecode-workspace
          printf '{"scripts":{"test":"echo ok","build":"echo build"}}\n' > /tmp/mobilecode-workspace/package.json
          python3 mobile_agent/tooling/mobilecode_helper_daemon.py \
            --port 18765 \
            --workspace-root /tmp/mobilecode-workspace \
            --auth-token ci-token \
            > artifacts/mobilecode-helper.log 2>&1 &
          helper_pid=$!
          auth_header='X-MobileCode-Token: ci-token'
          trap 'kill "$helper_pid" || true' EXIT

          for attempt in $(seq 1 20); do
            if curl -fsS -H "$auth_header" http://127.0.0.1:18765/v1/health > artifacts/helper-health.json; then
              break
            fi
            sleep 0.5
          done

          curl -fsS -H "$auth_header" http://127.0.0.1:18765/v1/health | tee artifacts/helper-health.json
          curl -fsS \
            -H "$auth_header" \
            -H 'Content-Type: application/json' \
            -X POST http://127.0.0.1:18765/v1/execute \
            -d '{"command":"python3 -c \"print(42)\"","cwd":"/tmp/mobilecode-workspace","timeoutMs":10000}' \
            | tee artifacts/helper-execute.json
          curl -fsS -N \
            -H "$auth_header" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/x-ndjson' \
            -X POST http://127.0.0.1:18765/v1/execute/stream \
            -d '{"command":"python3 -c \"print(43)\"","cwd":"/tmp/mobilecode-workspace","timeoutMs":10000}' \
            | tee artifacts/helper-stream.ndjson
          curl -fsS -H "$auth_header" http://127.0.0.1:18765/v1/tasks/current | tee artifacts/helper-task.json
          curl -fsS -H "$auth_header" 'http://127.0.0.1:18765/v1/tasks?limit=5' | tee artifacts/helper-tasks.json
          task_id=$(python3 -c "import json; print(json.load(open('artifacts/helper-task.json'))['task']['id'])")
          curl -fsS -H "$auth_header" "http://127.0.0.1:18765/v1/tasks/${task_id}/logs?limit=20" | tee artifacts/helper-task-logs.json
          curl -fsS \
            -H "$auth_header" \
            -H 'Content-Type: application/json' \
            -X POST http://127.0.0.1:18765/v1/project/preflight \
            -d '{"cwd":"/tmp/mobilecode-workspace"}' \
            | tee artifacts/helper-project-preflight.json
          curl -fsS \
            -H "$auth_header" \
            -H 'Content-Type: application/json' \
            -X POST http://127.0.0.1:18765/v1/execute \
            -d '{"command":"python3 -c \"import time; time.sleep(20)\"","cwd":"/tmp/mobilecode-workspace","timeoutMs":30000}' \
            > artifacts/helper-cancelled-execute.json 2>&1 &
          long_pid=$!
          sleep 1
          curl -fsS \
            -H "$auth_header" \
            -H 'Content-Type: application/json' \
            -X POST http://127.0.0.1:18765/v1/task/stop \
            -d '{}' \
            | tee artifacts/helper-stop.json
          wait "$long_pid" || true
          curl -fsS -H "$auth_header" http://127.0.0.1:18765/v1/tasks/current | tee artifacts/helper-cancelled-task.json

          grep '"ready":true' artifacts/helper-health.json
          grep '"authRequired":true' artifacts/helper-health.json
          grep '"exitCode":0' artifacts/helper-execute.json
          grep '"failureKind":"none"' artifacts/helper-execute.json
          grep '"stdout":"42' artifacts/helper-execute.json
          grep '"type":"stdout"' artifacts/helper-stream.ndjson
          grep '"type":"exit"' artifacts/helper-stream.ndjson
          grep '"status":"succeeded"' artifacts/helper-task.json
          grep '"failureKind":"none"' artifacts/helper-task.json
          grep '"logs":' artifacts/helper-task.json
          grep '"count":' artifacts/helper-tasks.json
          grep '"logs":' artifacts/helper-task-logs.json
          grep 'package.json' artifacts/helper-project-preflight.json
          grep '"stopped":true' artifacts/helper-stop.json
          grep '"status":"cancelled"' artifacts/helper-cancelled-task.json
          grep '"failureKind":"cancelled"' artifacts/helper-cancelled-task.json

      - name: Upload helper smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobilecode-helper-smoke
          path: artifacts/
