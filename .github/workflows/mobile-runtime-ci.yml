name: Mobile Runtime CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'mobile_agent/**'
      - 'docs/mobilecode-helper-runtime-protocol.md'
      - 'docs/mobilecode-release-qa.md'
      - '.github/workflows/mobile-runtime-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'mobile_agent/**'
      - 'docs/mobilecode-helper-runtime-protocol.md'
      - 'docs/mobilecode-release-qa.md'
      - '.github/workflows/mobile-runtime-ci.yml'

permissions:
  contents: read

concurrency:
  group: mobile-runtime-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-runtime-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve Flutter dependencies
        working-directory: mobile_agent
        run: flutter pub get

      - name: Analyze runtime and app sources
        working-directory: mobile_agent
        run: flutter analyze lib test --no-fatal-infos --no-fatal-warnings

      - name: Run RuntimeProvider tests
        working-directory: mobile_agent
        run: |
          flutter test \
            test/services/runtime_manager_test.dart \
            test/services/mobile_code_helper_provider_test.dart

  helper-daemon-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile helper daemon
        run: |
          python3 -m py_compile mobile_agent/tooling/mobilecode_helper_daemon.py
          python3 -m py_compile mobile_agent/tooling/prepare_android_project.py

      - name: Smoke test helper protocol
        run: |
          set -eux
          mkdir -p artifacts /tmp/mobilecode-workspace
          python3 mobile_agent/tooling/mobilecode_helper_daemon.py \
            --port 18765 \
            --workspace-root /tmp/mobilecode-workspace \
            > artifacts/mobilecode-helper.log 2>&1 &
          helper_pid=$!
          trap 'kill "$helper_pid" || true' EXIT

          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18765/v1/health > artifacts/helper-health.json; then
              break
            fi
            sleep 0.5
          done

          curl -fsS http://127.0.0.1:18765/v1/health | tee artifacts/helper-health.json
          curl -fsS \
            -H 'Content-Type: application/json' \
            -X POST http://127.0.0.1:18765/v1/execute \
            -d '{"command":"python3 -c \"print(42)\"","cwd":"/tmp/mobilecode-workspace","timeoutMs":10000}' \
            | tee artifacts/helper-execute.json
          curl -fsS -N \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/x-ndjson' \
            -X POST http://127.0.0.1:18765/v1/execute/stream \
            -d '{"command":"python3 -c \"print(43)\"","cwd":"/tmp/mobilecode-workspace","timeoutMs":10000}' \
            | tee artifacts/helper-stream.ndjson

          grep '"ready":true' artifacts/helper-health.json
          grep '"exitCode":0' artifacts/helper-execute.json
          grep '"stdout":"42' artifacts/helper-execute.json
          grep '"type":"stdout"' artifacts/helper-stream.ndjson
          grep '"type":"exit"' artifacts/helper-stream.ndjson

      - name: Upload helper smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobilecode-helper-smoke
          path: artifacts/
