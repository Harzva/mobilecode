name: Deploy MobileCode Demo Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - last
      - last-recover-from-v039
    paths:
      - 'app/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Build promotional site
        working-directory: app
        run: |
          npm ci
          npm run build
      - name: Attach demo pages
        run: |
          mkdir -p app/dist/demo app/dist/github-test app/dist/assets
          cp -R docs/demo/2048 app/dist/demo/
          cp -R docs/github-test/* app/dist/github-test/
          cp docs/mobilecode-principle-video.html app/dist/
          cp docs/mobilecode-principle-video-script.md app/dist/
          cp docs/assets/mobilecode-principle-* app/dist/assets/
          cp docs/assets/mobilecode-short-* app/dist/assets/
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
